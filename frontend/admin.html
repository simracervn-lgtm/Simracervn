<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<script>
const SUPABASE_URL = 'https://ekpisffpcovzuamplugm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_PTSKskpcthxWGr5Oo-Cyow_FbBhv-yZ';
const EDGE_URL = SUPABASE_URL + '/functions/v1/admin';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let products = [];
let currentUser = null;

function showApp(show) {
  document.getElementById('login-screen').classList.toggle('hidden', show);
  document.getElementById('app-screen').classList.toggle('hidden', !show);
}

async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) {
    currentUser = session.user;
    document.querySelector('#app-screen header span').textContent = currentUser.email;
    showApp(true);
    loadProducts();
    loadStats();
  } else {
    showApp(false);
  }
}
document.addEventListener('DOMContentLoaded', init);

async function login() {
  const email = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.querySelector('#login-screen button');
  
  try {
    btn.disabled = true;
    btn.innerHTML = 'Đang đăng nhập...';
    
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) throw error;
    
    currentUser = data.user;
    document.querySelector('#app-screen header span').textContent = currentUser.email;
    showApp(true);
    loadProducts();
    loadStats();
  } catch (err) {
    alert('Lỗi đăng nhập: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Đăng nhập';
  }
}

async function logout() {
  await supabaseClient.auth.signOut();
  products = [];
  showApp(false);
}

function formatPrice(v) {
  const n = Number(v) || 0;
  return n.toLocaleString('vi-VN') + '₫';
}

async function api(action, payload = {}) {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) throw new Error('Chưa đăng nhập');
  
  const res = await fetch(EDGE_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + session.access_token
    },
    body: JSON.stringify({ action, ...payload })
  });
  
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch { data = { raw: text }; }
  
  if (!res.ok) {
    throw new Error(data.error || data.message || `HTTP ${res.status}`);
  }
  return data;
}

async function loadProducts() {
  const list = document.getElementById('product-list');
  const count = document.getElementById('count');
  
  try {
    const data = await api('list_products');
    products = Array.isArray(data) ? data : (data.products || data.data || []);
  } catch (err) {
    products = [];
    console.error(err);
    if (err.message.includes('admin') || err.message.includes('Forbidden')) {
      alert('Tài khoản chưa được cấp quyền admin. Liên hệ quản trị.');
      logout();
      return;
    }
  }
  
  count.textContent = products.length;
  renderProducts();
}

function renderProducts() {
  const list = document.getElementById('product-list');
  
  if (!products.length) {
    list.innerHTML = `<div class="flex flex-col items-center justify-center py-20 text-zinc-600">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="opacity-30 mb-3"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <p class="text-[13px]">Chưa có sản phẩm</p></div>`;
    return;
  }
  
  list.innerHTML = products.map(p => {
    const id = p.id || '';
    const img = p.image || '';
    return `<div class="group flex items-center gap-3 p-3 bg-[#0a0a0a] hover:bg-[#111] border border-zinc-900 hover:border-zinc-800 rounded-xl transition">
      <div class="w-[64px] h-[64px] rounded-lg overflow-hidden bg-[#141414] border border-zinc-900 flex-shrink-0">
        <img src="${img}" alt="" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/128x128/141414/52525b?text=IMG'">
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-start gap-2">
          <h3 class="text-[13.5px] font-medium truncate">${p.name || 'Không tên'}</h3>
          ${p.torque ? `<span class="text-[10px] px-1.5 py-0.5 bg-orange-500/10 text-orange-400 rounded border border-orange-500/20 flex-shrink-0">${p.torque}Nm</span>` : ''}
        </div>
        <div class="flex items-center gap-2 mt-1">
          <span class="text-[11px] text-zinc-500">${p.brand || ''}</span>
          <span class="text-zinc-700">•</span>
          <span class="text-[11px] text-zinc-500">${p.category || ''}</span>
        </div>
        <div class="text-[13px] font-medium text-orange-400 mt-1.5">${formatPrice(p.price)}</div>
      </div>
      <div class="flex items-center gap-1.5 opacity-60 group-hover:opacity-100 transition">
        <button onclick="editProduct('${id}')" class="w-8 h-8 grid place-items-center bg-[#141414] hover:bg-zinc-800 border border-zinc-800 rounded-lg transition" title="Sửa">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button onclick="deleteProduct('${id}')" class="w-8 h-8 grid place-items-center bg-[#141414] hover:bg-red-950/50 hover:border-red-900 border-zinc-800 rounded-lg text-zinc-500 hover:text-red-400 transition" title="Xóa">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function resetForm() {
  document.getElementById('product-form').reset();
  document.getElementById('product-id').value = '';
  document.getElementById('brand').value = 'VNM';
  document.getElementById('category').value = 'WheelBase';
  document.getElementById('form-mode').textContent = 'Mới';
}

function editProduct(id) {
  const p = products.find(x => x.id == id);
  if (!p) return;
  document.getElementById('product-id').value = p.id;
  document.getElementById('brand').value = p.brand || 'VNM';
  document.getElementById('category').value = p.category || 'WheelBase';
  document.getElementById('name').value = p.name || '';
  document.getElementById('price').value = p.price || '';
  document.getElementById('torque').value = p.torque || '';
  document.getElementById('warranty').value = p.warranty || '';
  document.getElementById('compatibility').value = p.compatibility || '';
  document.getElementById('image').value = p.image || '';
  document.getElementById('youtube').value = p.youtube || '';
  document.getElementById('desc_vi').value = p.desc_vi || p.description_vi || '';
  document.getElementById('desc_en').value = p.desc_en || p.description_en || '';
  document.getElementById('form-mode').textContent = 'Sửa';
  window.scrollTo({top:0, behavior:'smooth'});
}

document.getElementById('product-form')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = document.getElementById('product-id').value;
  const payload = {
    brand: document.getElementById('brand').value,
    category: document.getElementById('category').value,
    name: document.getElementById('name').value.trim(),
    price: Number(document.getElementById('price').value),
    torque: document.getElementById('torque').value,
    warranty: document.getElementById('warranty').value,
    compatibility: document.getElementById('compatibility').value,
    image: document.getElementById('image').value.trim(),
    youtube: document.getElementById('youtube').value.trim(),
    desc_vi: document.getElementById('desc_vi').value.trim(),
    desc_en: document.getElementById('desc_en').value.trim(),
  };
  try {
    if (id) {
      await api('update_product', { id, ...payload });
    } else {
      await api('create_product', payload);
    }
    resetForm();
    loadProducts();
  } catch (err) {
    alert('Lỗi lưu: ' + err.message);
  }
});

async function deleteProduct(id) {
  if (!confirm('Xóa sản phẩm này?')) return;
  try {
    await api('delete_product', { id });
    loadProducts();
  } catch (err) {
    alert('Lỗi xóa: ' + err.message);
  }
}

document.getElementById('fileUpload')?.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const status = document.getElementById('uploadStatus');
  status.textContent = 'Đang upload...';
  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    const formData = new FormData();
    formData.append('file', file);
    const res = await fetch(EDGE_URL + '?action=upload', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + session.access_token },
      body: formData
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    document.getElementById('image').value = data.url;
    status.textContent = '✓ Đã upload';
  } catch (err) {
    status.textContent = 'Lỗi: ' + err.message;
  }
});

function switchTab(tab) {
  ['products','orders','stats'].forEach(t => {
    document.getElementById('tab-'+t).className = t===tab ? 'px-4 h-9 bg-orange-600 text-white rounded-lg text-[13px] font-medium' : 'px-4 h-9 bg-[#141414] border border-zinc-800 rounded-lg text-[13px]';
    document.getElementById('tab-'+t+'-content').classList.toggle('hidden', t!==tab);
  });
  if (tab==='orders') loadOrders();
  if (tab==='stats') loadStats();
  if (tab==='products') loadProducts();
}

async function loadOrders() {
  const el = document.getElementById('orders-list');
  el.innerHTML = '<div class="text-center py-10 text-zinc-500">Đang tải...</div>';
  try {
    const data = await api('list_orders');
    const orders = Array.isArray(data) ? data : (data.orders || []);
    if (!orders.length) {
      el.innerHTML = '<div class="text-center py-20 text-zinc-600">Chưa có đơn hàng</div>';
      return;
    }
    el.innerHTML = orders.map(o => {
      const id = o.id;
      const name = o.customer_name || 'Khách lẻ';
      const phone = o.customer_phone || o.phone || '';
      const address = o.customer_address || o.address || '';
      const total = Number(o.total || 0);
      const dateStr = new Date(o.created_at).toLocaleString('vi-VN');
      const isProcessed = o.status === 'processed';
      const items = Array.isArray(o.items) ? o.items : [];
      return `<div class="p-4 bg-[#0a0a0a] border border-zinc-800 rounded-xl ${isProcessed?'opacity-60':''}">
        <div class="flex justify-between">
          <div><div class="font-medium text-[14px] flex items-center gap-2">${name} ${isProcessed?'<span class="text-[10px] px-1.5 py-0.5 bg-green-500/15 text-green-400 rounded">Đã xử lý</span>':'<span class="text-[10px] px-1.5 py-0.5 bg-orange-500/15 text-orange-400 rounded">Mới</span>'}</div><div class="text-[12px] text-zinc-500">${phone}${address ? ' • ' + address : ''}</div></div>
          <div class="text-right"><div class="text-[12px] text-zinc-500">${dateStr}</div><div class="text-[13px] font-semibold text-orange-400">${total.toLocaleString('vi-VN')}₫</div></div>
        </div>
        <div class="text-[12px] text-zinc-300 mt-2">${items.map(i=>`${i.name} x${i.qty?? i.quantity?? 1}`).join(', ')}</div>
        <div class="flex gap-2 mt-3 pt-3 border-t border-zinc-800">
          <button onclick="markProcessed('${id}', this)" ${isProcessed?'disabled':''} class="h-7 px-3 bg-[#141414] hover:bg-green-950/50 border border-zinc-800 rounded-lg text-[12px]">${isProcessed?'✓ Đã xử lý':'Đã xử lý'}</button>
          <button onclick="deleteOrder('${id}')" class="h-7 px-3 bg-[#141414] hover:bg-red-950/50 border border-zinc-800 rounded-lg text-[12px] text-zinc-400">Xóa</button>
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = `<div class="text-red-400 p-4">Lỗi: ${e.message}</div>`;
  }
}

async function markProcessed(id, btn) {
  if (!confirm('Đánh dấu đã xử lý?')) return;
  try {
    btn.disabled = true;
    await api('update_order', { id, status: 'processed' });
    loadOrders();
    loadStats();
  } catch (e) { alert(e.message); btn.disabled=false; }
}

async function deleteOrder(id) {
  if (!confirm('Xóa đơn này?')) return;
  try {
    await api('delete_order', { id });
    loadOrders();
    loadStats();
  } catch (e) { alert(e.message); }
}

async function loadStats() {
  try {
    const data = await api('stats');
    document.getElementById('stat-orders').textContent = data.total_orders || 0;
    document.getElementById('stat-revenue').textContent = (data.revenue || 0).toLocaleString('vi-VN')+'₫';
    document.getElementById('stat-today-orders').textContent = data.today_orders || 0;
    document.getElementById('stat-today-revenue').textContent = (data.today_revenue || 0).toLocaleString('vi-VN')+'₫';
  } catch(e) { console.error(e); }
}
</script>
</body>
