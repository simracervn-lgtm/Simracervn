function showTab(name){
  ['products','orders','stats'].forEach(t=>{
    document.getElementById('tab-content-'+t).classList.toggle('hidden', t!==name);
    document.getElementById('tab-'+t).classList.toggle('bg-orange-600', t===name);
    document.getElementById('tab-'+t).classList.toggle('text-white', t===name);
    document.getElementById('tab-'+t).classList.toggle('bg-zinc-800', t!==name);
  });
  if(name==='orders') loadOrders();
  if(name==='stats') loadStats();
}
let lastOrderCount = 0;

async function loadOrders(){
  let orders = [];
  try{
    const r = await fetch('https://simracer-vn.onrender.com/api/orders');
    if(r.ok) orders = await r.json();
    else throw new Error('no api');
  }catch(e){
    // fallback to localStorage
    orders = JSON.parse(localStorage.getItem('orders')||'[]');
  }
  const tbody = document.getElementById('orders-tbody');
  if(!tbody) return;
  tbody.innerHTML = orders.map(o=>{
    const items = (o.items||[]).map(i=>`${i.name||i.title||'Item'} x${i.qty||1}`).join(', ');
    const date = new Date(o.createdAt||Date.now()).toLocaleString('vi-VN');
    return `<tr class="border-b border-zinc-800 hover:bg-zinc-900/50">
      <td class="p-3">${o.customerName||''}</td>
      <td class="p-3">${o.phone||''}</td>
      <td class="p-3 max-w-[200px] truncate" title="${o.address||''}">${o.address||''}</td>
      <td class="p-3 max-w-[150px] truncate" title="${o.note||''}">${o.note||''}</td>
      <td class="p-3 max-w-[200px] truncate" title="${items}">${items}</td>
      <td class="p-3 text-orange-400 font-semibold">${(o.total||0).toLocaleString('vi-VN')}₫</td>
      <td class="p-3 text-xs text-zinc-500">${date}</td>
      <td class="p-3"><button onclick="delOrder('${o.id}')" class="text-red-400 hover:text-red-300 text-xs">Xóa</button></td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" class="p-6 text-center text-zinc-500">Chưa có đơn hàng</td></tr>';
}
function delOrder(id){
  let orders = JSON.parse(localStorage.getItem('orders')||'[]');
  orders = orders.filter(o=>String(o.id)!==String(id));
  localStorage.setItem('orders',JSON.stringify(orders));
  loadOrders();
}
    lastOrderCount = orders.length;
  }catch(e){ console.error(e); }
}
async function loadStats(){
  const r = await fetch('https://simracer-vn.onrender.com/api/orders');
  const orders = await r.json();
  const totalOrders = orders.length;
  const revenue = orders.reduce((s,o)=>s+Number(o.total||0),0);
  document.getElementById('stat-orders').textContent = totalOrders;
  document.getElementById('stat-revenue').textContent = revenue.toLocaleString('vi-VN')+'₫';
  document.getElementById('stat-avg').textContent = totalOrders? Math.round(revenue/totalOrders).toLocaleString('vi-VN')+'₫':'0₫';
  // top products
  const map = {};
  orders.forEach(o=> (o.items||[]).forEach(i=>{ map[i.name]=(map[i.name]||0)+i.quantity; }));
  const top = Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('top-products').innerHTML = top.map(([n,q])=>`<div class="flex justify-between"><span>${n}</span><span class="text-zinc-400">${q} cái</span></div>`).join('') || '<div class="text-zinc-500">Chưa có dữ liệu</div>';
}
function notifyNewOrder(count, order){
  if(Notification.permission==='granted'){
    new Notification(`Có ${count} đơn hàng mới!`, {body:`${order.customer_name} - ${Number(order.total).toLocaleString('vi-VN')}₫`, icon:'/favicon.ico'});
  }
  // sound
  const audio = new Audio('data:audio/wav;base64,UklGRnoAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoAAACA');
  audio.play().catch(()=>{});
}
// Request permission on load
document.addEventListener('DOMContentLoaded', ()=>{
  if('Notification' in window && Notification.permission!=='granted' && Notification.permission!=='denied'){
    Notification.requestPermission();
  }
  setInterval(()=>{ if(!document.getElementById('tab-content-orders').classList.contains('hidden')) return; loadOrders(); }, 15000);
  loadOrders();
});

<script>
const tokenKey = 'token';
let products = [];

function showApp(show) {
  document.getElementById('login-screen').classList.toggle('hidden', show);
  document.getElementById('app-screen').classList.toggle('hidden', !show);
}

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = event?.target?.querySelector?.('button') || document.querySelector('#login-screen button');
  
  try {
    btn.disabled = true;
    btn.innerHTML = 'Đang đăng nhập...';
    
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await res.json().catch(() => ({}));
    
    if (!res.ok) {
      throw new Error(data.message || data.error || 'Đăng nhập thất bại');
    }
    
    const token = data.token || data.accessToken;
    if (!token) throw new Error('Không nhận được token');
    
    localStorage.setItem(tokenKey, token);
    showApp(true);
    loadProducts();
  } catch (err) {
    alert('Lỗi đăng nhập: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Đăng nhập';
  }
}

function logout() {
  localStorage.removeItem(tokenKey);
  products = [];
  showApp(false);
}

function formatPrice(v) {
  const n = Number(v) || 0;
  return n.toLocaleString('vi-VN') + '₫';
}

function getToken() {
  return localStorage.getItem(tokenKey);
}

async function loadProducts() {
  const list = document.getElementById('product-list');
  const count = document.getElementById('count');
  
  try {
    const token = getToken();
    if (!token) throw new Error('Chưa đăng nhập');
    
    const res = await fetch('/api/products', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    const data = await res.json().catch(() => ({}));
    
    if (!res.ok) {
      throw new Error(data.message || data.error || `HTTP ${res.status}`);
    }
    
    // Ensure products is always an array
    if (Array.isArray(data)) {
      products = data;
    } else if (data && Array.isArray(data.products)) {
      products = data.products;
    } else if (data && Array.isArray(data.data)) {
      products = data.data;
    } else {
      products = [];
    }
    
  } catch (err) {
    products = [];
    alert('Lỗi tải sản phẩm: ' + err.message);
    if (err.message.includes('401') || err.message.toLowerCase().includes('unauthorized') || err.message.includes('token')) {
      logout();
    }
  }
  
  count.textContent = Array.isArray(products) ? products.length : 0;
  renderProducts();
}

function renderProducts() {
  const list = document.getElementById('product-list');
  
  if (!Array.isArray(products) || products.length === 0) {
    list.innerHTML = `
      <div class="flex flex-col items-center justify-center py-20 text-zinc-600">

function resetForm() {
  document.getElementById('product-form').reset();
  document.getElementById('product-id').value = '';
  document.getElementById('brand').value = 'VNM';
  document.getElementById('category').value = 'WheelBase';
  document.getElementById('form-mode').textContent = 'Mới';
  document.getElementById('form-mode').className = 'text-[11px] px-2 py-1 bg-orange-500/10 text-orange-400 rounded-md border border-orange-500/20';
}

function editProduct(id) {
  const p = Array.isArray(products) ? products.find(x => (x.id || x._id) == id) : null;
  if (!p) return alert('Không tìm thấy sản phẩm');
  
  document.getElementById('product-id').value = id;
  document.getElementById('brand').value = p.brand || 'VNM';
  document.getElementById('category').value = p.category || 'WheelBase';
  document.getElementById('name').value = p.name || '';
  document.getElementById('price').value = p.price || '';
  document.getElementById('torque').value = p.torque || '';
  document.getElementById('warranty').value = p.warranty || '';
  document.getElementById('compatibility').value = p.compatibility || '';
  document.getElementById('image').value = p.image || p.imageUrl || '';
  document.getElementById('desc_vi').value = p.desc_vi || p.description_vi || '';
  document.getElementById('desc_en').value = p.desc_en || p.description_en || '';
  document.getElementById('youtube').value = p.youtube || p.youtubeUrl || '';
  
  document.getElementById('form-mode').textContent = 'Sửa';
  document.getElementById('form-mode').className = 'text-[11px] px-2 py-1 bg-blue-500/10 text-blue-400 rounded-md border border-blue-500/20';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function saveProduct(e) {
  e.preventDefault();
  const token = getToken();
  if (!token) return alert('Chưa đăng nhập');
  
  const id = document.getElementById('product-id').value;
  const payload = {
    brand: document.getElementById('brand').value,
    category: document.getElementById('category').value,
    name: document.getElementById('name').value.trim(),
    price: Number(document.getElementById('price').value) || 0,
    torque: document.getElementById('torque').value.trim(),
    warranty: document.getElementById('warranty').value.trim(),
    compatibility: document.getElementById('compatibility').value.trim(),
    image: document.getElementById('image').value.trim(),
    desc_vi: document.getElementById('desc_vi').value.trim(),
    desc_en: document.getElementById('desc_en').value.trim(),
    youtube: document.getElementById('youtube').value.trim()
  };
  
  if (!payload.name) return alert('Vui lòng nhập tên sản phẩm');
  if (!payload.price) return alert('Vui lòng nhập giá');
  
  const btn = e.target.querySelector('button[type="submit"]');
  const originalText = btn.innerHTML;
  
  try {
    btn.disabled = true;
    btn.innerHTML = 'Đang lưu...';
    
    const url = id ? `/api/products/${id}` : '/api/products';
    const method = id ? 'PUT' : 'POST';
    
    const res = await fetch(url, {
      method,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify(payload)
    });
    
    const data = await res.json().catch(() => ({}));
    
    if (!res.ok) {
      throw new Error(data.message || data.error || 'Lưu thất bại');
    }
    
    alert(id ? 'Đã cập nhật!' : 'Đã thêm sản phẩm!');
    resetForm();
    loadProducts();
  } catch (err) {
    alert('Lỗi lưu: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalText;
  }
}

async function deleteProduct(id) {
  if (!id) return;
  if (!confirm('Xóa sản phẩm này? Hành động không thể hoàn tác.')) return;
  
  const token = getToken();
  try {
    const res = await fetch(`/api/products/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.message || data.error || 'Xóa thất bại');
    
    alert('Đã xóa');
    loadProducts();
  } catch (err) {
    alert('Lỗi xóa: ' + err.message);
  }
}

document.getElementById('product-form').addEventListener('submit', saveProduct);

window.addEventListener('DOMContentLoaded', () => {
  const token = getToken();
  if (token) {
    showApp(true);
    loadProducts();
  } else {
    showApp(false);
  }
});

function showTab(name){
  ['products','orders','stats'].forEach(t=>{
    document.getElementById('tab-content-'+t).classList.toggle('hidden', t!==name);
    document.getElementById('tab-'+t).classList.toggle('bg-orange-600', t===name);

  if(name==='orders') loadOrders();

let lastOrderCount = 0;

async function loadOrders(){
  let orders = [];
  try{
    const r = await fetch('https://simracer-vn.onrender.com/api/orders');
    if(r.ok) orders = await r.json();
    else throw new Error('no api');
  }catch(e){
    // fallback to localStorage
    orders = JSON.parse(localStorage.getItem('orders')||'[]');
  }
  const tbody = document.getElementById('orders-tbody');
  if(!tbody) return;
  tbody.innerHTML = orders.map(o=>{
    const items = (o.items||[]).map(i=>`${i.name||i.title||'Item'} x${i.qty||1}`).join(', ');
    const date = new Date(o.createdAt||Date.now()).toLocaleString('vi-VN');
    return `<tr class="border-b border-zinc-800 hover:bg-zinc-900/50">
      <td class="p-3">${o.customerName||''}</td>
      <td class="p-3">${o.phone||''}</td>
      <td class="p-3 max-w-[200px] truncate" title="${o.address||''}">${o.address||''}</td>
      <td class="p-3 max-w-[150px] truncate" title="${o.note||''}">${o.note||''}</td>
      <td class="p-3 max-w-[200px] truncate" title="${items}">${items}</td>
      <td class="p-3 text-orange-400 font-semibold">${(o.total||0).toLocaleString('vi-VN')}₫</td>
      <td class="p-3 text-xs text-zinc-500">${date}</td>
      <td class="p-3"><button onclick="delOrder('${o.id}')" class="text-red-400 hover:text-red-300 text-xs">Xóa</button></td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" class="p-6 text-center text-zinc-500">Chưa có đơn hàng</td></tr>';
}
function delOrder(id){
  let orders = JSON.parse(localStorage.getItem('orders')||'[]');
  orders = orders.filter(o=>String(o.id)!==String(id));
  localStorage.setItem('orders',JSON.stringify(orders));
  loadOrders();
}
    lastOrderCount = orders.length;
  }catch(e){ console.error(e); }
}
async function loadStats(){
  const r = await fetch('https://simracer-vn.onrender.com/api/orders');
  const orders = await r.json();
  const totalOrders = orders.length;
  const revenue = orders.reduce((s,o)=>s+Number(o.total||0),0);
  document.getElementById('stat-orders').textContent = totalOrders;
  document.getElementById('stat-revenue').textContent = revenue.toLocaleString('vi-VN')+'₫';
  document.getElementById('stat-avg').textContent = totalOrders? Math.round(revenue/totalOrders).toLocaleString('vi-VN')+'₫':'0₫';
  // top products
  const map = {};
  orders.forEach(o=> (o.items||[]).forEach(i=>{ map[i.name]=(map[i.name]||0)+i.quantity; }));
  const top = Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('top-products').innerHTML = top.map(([n,q])=>`<div class="flex justify-between"><span>${n}</span><span class="text-zinc-400">${q} cái</span></div>`).join('') || '<div class="text-zinc-500">Chưa có dữ liệu</div>';
}
function notifyNewOrder(count, order){
  if(Notification.permission==='granted'){
    new Notification(`Có ${count} đơn hàng mới!`, {body:`${order.customer_name} - ${Number(order.total).toLocaleString('vi-VN')}₫`, icon:'/favicon.ico'});
  }
  // sound
  const audio = new Audio('data:audio/wav;base64,UklGRnoAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoAAACA');
  audio.play().catch(()=>{});
}
// Request permission on load
document.addEventListener('DOMContentLoaded', ()=>{
  if('Notification' in window && Notification.permission!=='granted' && Notification.permission!=='denied'){
    Notification.requestPermission();
  }
  setInterval(()=>{ if(!document.getElementById('tab-content-orders').classList.contains('hidden')) return; loadOrders(); }, 15000);
  loadOrders();
});

</script>
