<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin - Sim Racing</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{font-family:Inter}body{background:#0a0a0a;color:#e4e4e7}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#27272a}</style>
</head>
<body>
<div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-[380px] bg-[#141414] border border-zinc-800 rounded-2xl p-8">
    <h1 class="text-xl font-semibold text-center mb-6">SIM RACING ADMIN</h1>
    <input id="username" value="admin" class="w-full h-11 mb-3 px-3 bg-black border border-zinc-800 rounded-xl">
    <input id="password" type="password" value="147258" class="w-full h-11 mb-4 px-3 bg-black border border-zinc-800 rounded-xl">
    <button onclick="login()" class="w-full h-11 bg-orange-600 rounded-xl font-medium">Đăng nhập</button>
  </div>
</div>

<div id="app-screen" class="hidden">
<header class="sticky top-0 bg-[#0a0a0a]/80 backdrop-blur border-b border-zinc-900 h-14 flex items-center px-6 justify-between">
  <div class="font-semibold">Quản lý Sim Racing</div>
  <button onclick="logout()" class="px-3 h-8 bg-[#141414] border border-zinc-800 rounded-lg text-sm">Đăng xuất</button>
</header>
<div class="max-w-[1600px] mx-auto px-4 mt-4 flex gap-2">
  <button id="tab-products" onclick="switchTab('products')" class="px-4 h-9 bg-orange-600 text-white rounded-lg text-sm">Sản phẩm</button>
  <button id="tab-orders" onclick="switchTab('orders')" class="px-4 h-9 bg-[#141414] border border-zinc-800 rounded-lg text-sm relative">Đơn hàng <span id="orders-badge" class="hidden absolute -top-1.5 -right-1.5 min-w-[18px] h-[18px] px-1 bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center">0</span></button>
  <button id="tab-stats" onclick="switchTab('stats')" class="px-4 h-9 bg-[#141414] border border-zinc-800 rounded-lg text-sm">Thống kê</button>
</div>

<div id="tab-products-content" class="max-w-[1600px] mx-auto p-4">
  <div class="bg-[#141414] border border-zinc-900 rounded-2xl p-5">
    <div class="flex justify-between mb-4"><h2 class="font-semibold">Sản phẩm</h2><span class="text-xs text-zinc-500"><span id="count">0</span> SP</span></div>
    <div id="product-list" class="space-y-2 max-h-[70vh] overflow-auto"></div>
  </div>
</div>

<div id="tab-orders-content" class="hidden max-w-[1600px] mx-auto p-4">
  <div class="bg-[#141414] border border-zinc-900 rounded-2xl">
    <div class="p-4 border-b border-zinc-900 flex justify-between"><h2 class="font-semibold">Đơn hàng</h2><button onclick="loadOrders()" class="text-xs px-3 h-7 bg-black border border-zinc-800 rounded-lg">Tải lại</button></div>
    <div id="orders-list" class="p-4 space-y-3 max-h-[70vh] overflow-auto"><div class="text-center py-20 text-zinc-600">Chưa có đơn</div></div>
  </div>
</div>

<div id="tab-stats-content" class="hidden max-w-[1600px] mx-auto p-4">
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="bg-[#141414] border border-zinc-900 rounded-xl p-4"><div class="text-xs text-zinc-500">Tổng đơn</div><div id="stat-orders" class="text-2xl font-semibold">0</div></div>
    <div class="bg-[#141414] border border-zinc-900 rounded-xl p-4"><div class="text-xs text-zinc-500">Doanh thu</div><div id="stat-revenue" class="text-2xl font-semibold">0₫</div></div>
    <div class="bg-[#141414] border border-zinc-900 rounded-xl p-4"><div class="text-xs text-zinc-500">Hôm nay</div><div id="stat-today-orders" class="text-2xl font-semibold">0</div></div>
    <div class="bg-[#141414] border border-zinc-900 rounded-xl p-4"><div class="text-xs text-zinc-500">DT hôm nay</div><div id="stat-today-revenue" class="text-2xl font-semibold">0₫</div></div>
  </div>
</div>
</div>

<audio id="order-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

<script>
const TOKEN_KEY = 'token';
let products = [];
let lastOrderCount = 0;

function showApp(show){
  document.getElementById('login-screen').classList.toggle('hidden', show);
  document.getElementById('app-screen').classList.toggle('hidden', !show);
}

async function login(){
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  const btn = document.querySelector('#login-screen button');
  try{
    btn.disabled = true; btn.textContent = 'Đang đăng nhập...';
    const res = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'Sai tài khoản');
    localStorage.setItem(TOKEN_KEY, data.token);
    showApp(true);
    loadProducts();
    loadOrders();
    setInterval(()=>{ const oc=document.getElementById('tab-orders-content'); if(oc && !oc.classList.contains('hidden')) loadOrders(); },15000);
  }catch(e){ alert(e.message); }
  finally{ btn.disabled=false; btn.textContent='Đăng nhập'; }
}

function logout(){ localStorage.removeItem(TOKEN_KEY); showApp(false); }

function getToken(){ return localStorage.getItem(TOKEN_KEY); }

function formatPrice(v){ return (Number(v)||0).toLocaleString('vi-VN')+'₫'; }

async function loadProducts(){
  try{
    const res = await fetch('/api/products',{headers:{Authorization:'Bearer '+getToken()}});
    const data = await res.json();
    products = Array.isArray(data)?data:(data.products||data.data||[]);
  }catch(e){ products=[]; }
  document.getElementById('count').textContent = products.length;
  renderProducts();
}

function renderProducts(){
  const list = document.getElementById('product-list');
  if(!products.length){ list.innerHTML = '<div class="text-center py-20 text-zinc-600">Chưa có sản phẩm</div>'; return; }
  list.innerHTML = products.map(p=>{
    const id = p.id||p._id||'';
    const img = p.image||p.imageUrl||'';
    return '<div class="flex items-center gap-3 p-3 bg-[#0a0a0a] border border-zinc-900 rounded-xl">'+
      '<img src="'+img+'" class="w-16 h-16 object-cover rounded-lg bg-[#141414]" onerror="this.src='https://placehold.co/128'">'+
      '<div class="flex-1"><div class="font-medium text-[14px]">'+(p.name||'')+'</div><div class="text-xs text-zinc-500">'+(p.brand||'')+' • '+(p.category||'')+'</div><div class="text-orange-400 mt-1">'+formatPrice(p.price)+'</div></div>'+
      '<button onclick="editProduct(''+id+'')" class="w-8 h-8 bg-[#141414] border border-zinc-800 rounded-lg">✏️</button>'+
      '<button onclick="deleteProduct(''+id+'')" class="w-8 h-8 bg-[#141414] border border-zinc-800 rounded-lg">🗑️</button>'+
      '</div>';
  }).join('');
}

function switchTab(tab){
  ['products','orders','stats'].forEach(t=>{
    document.getElementById('tab-'+t+'-content').classList.toggle('hidden',t!==tab);
    const btn=document.getElementById('tab-'+t);
    if(t===tab){ btn.classList.add('bg-orange-600','text-white'); btn.classList.remove('bg-[#141414]','border','border-zinc-800'); }
    else{ btn.classList.remove('bg-orange-600','text-white'); btn.classList.add('bg-[#141414]','border','border-zinc-800'); }
  });
  if(tab==='orders') loadOrders();
  if(tab==='stats') loadStats();
}

async function loadOrders(){
  const el = document.getElementById('orders-list');
  const badge = document.getElementById('orders-badge');
  try{
    const res = await fetch('/api/orders',{headers:{Authorization:'Bearer '+getToken()}});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const orders = await res.json();
    if(badge){ badge.textContent = orders.length; badge.classList.toggle('hidden',orders.length===0); }
    if(orders.length>lastOrderCount && lastOrderCount>0){ document.getElementById('order-sound').play().catch(()=>{}); }
    lastOrderCount = orders.length;
    if(!orders.length){ el.innerHTML='<div class="text-center py-20 text-zinc-600">Chưa có đơn hàng</div>'; return; }
    let html='';
    for(const o of orders){
      const items = (o.items||[]).map(i=>(i.name||i.id)+' x'+(i.qty||1)).join(', ');
      html+='<div class="p-4 bg-[#0a0a0a] border border-zinc-800 rounded-xl mb-3 hover:border-zinc-700">';
      html+='<div class="flex justify-between items-start"><div><div class="font-medium">'+(o.customer_name||'Khách')+'</div><div class="text-xs text-zinc-500 mt-0.5">'+(o.phone||'')+'</div></div>';
      html+='<div class="text-right"><div class="text-xs text-zinc-500">'+new Date(o.created_at).toLocaleString('vi-VN')+'</div><div class="text-orange-400 font-semibold mt-1">'+formatPrice(o.total)+'</div></div></div>';
      html+='<div class="text-xs text-zinc-400 mt-2">'+(o.address||'')+'</div>';
      if(items) html+='<div class="text-xs text-zinc-300 mt-1">'+items+'</div>';
      if(o.note) html+='<div class="text-xs italic text-zinc-500 mt-1 border-l-2 border-zinc-800 pl-2">Ghi chú: '+o.note+'</div>';
      html+='</div>';
    }
    el.innerHTML = html;
  }catch(e){ el.innerHTML='<div class="text-center py-20 text-red-400">Lỗi tải: '+e.message+'</div>'; }
}

async function loadStats(){
  try{
    const res = await fetch('/api/orders',{headers:{Authorization:'Bearer '+getToken()}});
    const orders = await res.json();
    const today = new Date().toDateString();
    const todayOrders = orders.filter(o=>new Date(o.created_at).toDateString()===today);
    document.getElementById('stat-orders').textContent = orders.length;
    document.getElementById('stat-revenue').textContent = formatPrice(orders.reduce((a,b)=>a+(b.total||0),0));
    document.getElementById('stat-today-orders').textContent = todayOrders.length;
    document.getElementById('stat-today-revenue').textContent = formatPrice(todayOrders.reduce((a,b)=>a+(b.total||0),0));
  }catch(e){}
}

// product form handlers (keep simple)
document.addEventListener('DOMContentLoaded',()=>{
  if(getToken()){ showApp(true); loadProducts(); loadOrders(); }
  const form=document.getElementById('product-form');
  if(form) form.addEventListener('submit', async e=>{
    e.preventDefault();
    const id=document.getElementById('product-id').value;
    const payload={
      brand:brand.value, category:category.value, name:name.value, price:Number(price.value)||0,
      torque:torque.value, warranty:warranty.value, compatibility:compatibility.value,
      image:image.value, desc_vi:desc_vi.value, desc_en:desc_en.value, youtube:youtube.value
    };
    const url=id?'/api/products/'+id:'/api/products';
    const method=id?'PUT':'POST';
    await fetch(url,{method,headers:{'Content-Type':'application/json',Authorization:'Bearer '+getToken()},body:JSON.stringify(payload)});
    form.reset(); loadProducts();
  });
});

window.login=login; window.logout=logout; window.switchTab=switchTab; window.loadOrders=loadOrders; window.loadProducts=loadProducts;
</script>

</body></html>
