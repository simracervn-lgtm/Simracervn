<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Secure - Sim Racing</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>*{font-family:Inter,sans-serif}body{background:#0a0a0a;color:#e4e4e7}</style>
</head>
<body>
<div id="login" class="min-h-screen grid place-items-center p-4">
  <div class="w-full max-w-[380px] bg-[#141414] border border-zinc-800 rounded-2xl p-8">
    <h1 class="text-xl font-semibold mb-6 text-center">Đăng nhập Admin</h1>
    <input id="email" type="email" placeholder="admin@simracervn.com" class="w-full h-11 px-3 mb-3 bg-black border border-zinc-800 rounded-xl">
    <input id="pass" type="password" placeholder="Mật khẩu" class="w-full h-11 px-3 mb-4 bg-black border border-zinc-800 rounded-xl">
    <button onclick="doLogin()" class="w-full h-11 bg-orange-600 rounded-xl font-medium">Đăng nhập</button>
    <p id="err" class="text-red-400 text-sm mt-3 hidden"></p>
  </div>
</div>

<div id="app" class="hidden max-w-[1200px] mx-auto p-6">
  <header class="flex justify-between items-center mb-6">
    <h1 class="text-xl font-semibold">Quản lý đơn hàng</h1>
    <div class="flex gap-3 items-center">
      <span id="userEmail" class="text-sm text-zinc-400"></span>
      <button onclick="doLogout()" class="px-3 h-8 bg-zinc-800 rounded-lg text-sm">Thoát</button>
    </div>
  </header>
  
  <div class="grid grid-cols-4 gap-4 mb-6">
    <div class="bg-[#141414] p-4 rounded-xl border border-zinc-900"><div class="text-xs text-zinc-500">Tổng đơn</div><div id="s1" class="text-2xl font-semibold">0</div></div>
    <div class="bg-[#141414] p-4 rounded-xl border border-zinc-900"><div class="text-xs text-zinc-500">Doanh thu</div><div id="s2" class="text-2xl font-semibold">0₫</div></div>
    <div class="bg-[#141414] p-4 rounded-xl border border-zinc-900"><div class="text-xs text-zinc-500">Hôm nay</div><div id="s3" class="text-2xl font-semibold">0</div></div>
    <div class="bg-[#141414] p-4 rounded-xl border border-zinc-900"><div class="text-xs text-zinc-500">DT hôm nay</div><div id="s4" class="text-2xl font-semibold">0₫</div></div>
  </div>

  <div id="orders" class="space-y-3"></div>
</div>

<script>
const SUPABASE_URL = 'https://ekpisffpcovzuamplugm.supabase.co'
const SUPABASE_KEY = 'sb_publishable_PTSKskpcthxWGr5Oo-Cyow_FbBhv-yZ'
const EDGE_URL = `${SUPABASE_URL}/functions/v1/admin`

const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function doLogin(){
  const email = document.getElementById('email').value
  const pass = document.getElementById('pass').value
  const { data, error } = await supa.auth.signInWithPassword({ email, password: pass })
  if(error){ document.getElementById('err').textContent = error.message; document.getElementById('err').classList.remove('hidden'); return }
  initApp()
}

async function initApp(){
  const { data:{session} } = await supa.auth.getSession()
  if(!session){ return }
  document.getElementById('login').classList.add('hidden')
  document.getElementById('app').classList.remove('hidden')
  document.getElementById('userEmail').textContent = session.user.email
  loadAll()
}

async function callAdmin(action, payload={}){
  const { data:{session} } = await supa.auth.getSession()
  const res = await fetch(EDGE_URL, {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+session.access_token },
    body: JSON.stringify({ action, payload })
  })
  if(!res.ok) throw new Error((await res.json()).error)
  return res.json()
}

async function loadAll(){
  const [orders, stats] = await Promise.all([
    callAdmin('list_orders'),
    callAdmin('stats')
  ])
  document.getElementById('s1').textContent = stats.totalOrders
  document.getElementById('s2').textContent = stats.revenue.toLocaleString('vi-VN')+'₫'
  document.getElementById('s3').textContent = stats.todayOrders
  document.getElementById('s4').textContent = stats.todayRevenue.toLocaleString('vi-VN')+'₫'
  
  document.getElementById('orders').innerHTML = orders.map(o=>`
    <div class="p-4 bg-[#141414] border border-zinc-800 rounded-xl">
      <div class="flex justify-between"><div><b>${o.customer_name||'Khách lẻ'}</b> - ${o.phone||''}</div><div class="text-orange-400">${Number(o.total).toLocaleString('vi-VN')}₫</div></div>
      <div class="text-sm text-zinc-400 mt-1">${(o.items||[]).map(i=>i.name+' x'+(i.qty||1)).join(', ')}</div>
      <div class="flex gap-2 mt-3">
        <button onclick="processOrder('${o.id}')" class="px-3 h-7 bg-zinc-800 rounded text-xs">Đã xử lý</button>
        <button onclick="delOrder('${o.id}')" class="px-3 h-7 bg-red-900/30 text-red-400 rounded text-xs">Xóa</button>
      </div>
    </div>`).join('')
}

async function delOrder(id){ if(confirm('Xóa?')){ await callAdmin('delete_order',{id}); loadAll() } }
async function processOrder(id){ await callAdmin('process_order',{id}); loadAll() }
async function doLogout(){ await supa.auth.signOut(); location.reload() }

supa.auth.getSession().then(({data})=>{ if(data.session) initApp() })
</script>
</body>
</html>
