
<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - SimRacer VN</title><script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{font-family:Inter,sans-serif}body{background:#0a0a0a;color:#e4e4e7}</style></head>
<body>
<div id="login" class="min-h-screen flex items-center justify-center">
 <div class="bg-zinc-900 p-8 rounded-2xl w-80">
  <h1 class="text-xl font-semibold mb-4 text-center">SIMRACER ADMIN</h1>
  <input id="u" placeholder="admin" class="w-full mb-2 p-2 bg-black border border-zinc-800 rounded" value="admin">
  <input id="p" type="password" placeholder="147258" class="w-full mb-4 p-2 bg-black border border-zinc-800 rounded" value="147258">
  <button onclick="login()" class="w-full bg-orange-600 p-2 rounded">Đăng nhập</button>
 </div>
</div>
<div id="app" class="hidden">
<header class="flex justify-between p-4 border-b border-zinc-800">
 <div class="flex gap-4"><button onclick="showTab('products')" class="tab-btn">Sản phẩm</button>
 <button onclick="showTab('orders')" class="tab-btn">Đơn đặt hàng <span id="order-badge" class="hidden ml-1 bg-red-600 text-xs px-1.5 rounded-full">0</span></button>
 <button onclick="showTab('stats')" class="tab-btn">Thông số bán</button></div>
 <button onclick="logout()" class="text-sm">Đăng xuất</button>
</header>
<main class="p-4">
 <section id="tab-products">
  <div class="grid lg:grid-cols-3 gap-4">
   <div class="lg:col-span-1 bg-zinc-900 p-4 rounded-xl">
    <h2 class="font-semibold mb-3">Thêm/Sửa</h2>
    <form id="f" class="space-y-2">
     <input type="hidden" id="id">
     <select id="brand" class="w-full p-2 bg-black border border-zinc-800 rounded"><option>VNM</option><option>MOZA</option><option>SIMAGIC</option></select>
     <input id="name" placeholder="Tên SP" required class="w-full p-2 bg-black border border-zinc-800 rounded">
     <input id="price" type="number" placeholder="Giá" required class="w-full p-2 bg-black border border-zinc-800 rounded">
     <input id="torque" placeholder="Nm" class="w-full p-2 bg-black border border-zinc-800 rounded">
     <input id="image" placeholder="URL ảnh" class="w-full p-2 bg-black border border-zinc-800 rounded">
     <textarea id="desc_vi" placeholder="Mô tả VI" class="w-full p-2 bg-black border border-zinc-800 rounded"></textarea>
     <textarea id="desc_en" placeholder="Mô tả EN" class="w-full p-2 bg-black border border-zinc-800 rounded"></textarea>
     <button class="w-full bg-orange-600 p-2 rounded">Lưu</button>
    </form>
   </div>
   <div class="lg:col-span-2 bg-zinc-900 p-4 rounded-xl">
    <h2 class="font-semibold mb-3">Danh sách</h2>
    <div id="list" class="space-y-2 max-h-[70vh] overflow-auto"></div>
   </div>
  </div>
 </section>
 <section id="tab-orders" class="hidden">
  <div class="bg-zinc-900 p-4 rounded-xl">
   <div class="flex justify-between mb-3"><h2 class="font-semibold">Đơn đặt hàng</h2><button onclick="loadOrders()" class="text-sm underline">Làm mới</button></div>
   <div id="orders" class="space-y-3"></div>
  </div>
 </section>
 <section id="tab-stats" class="hidden">
  <div class="grid md:grid-cols-3 gap-4">
   <div class="bg-zinc-900 p-4 rounded-xl"><div class="text-zinc-500 text-sm">Doanh thu hôm nay</div><div id="stat-today" class="text-2xl font-bold text-orange-400">0₫</div></div>
   <div class="bg-zinc-900 p-4 rounded-xl"><div class="text-zinc-500 text-sm">Tổng đơn</div><div id="stat-count" class="text-2xl font-bold">0</div></div>
   <div class="bg-zinc-900 p-4 rounded-xl"><div class="text-zinc-500 text-sm">Đơn mới</div><div id="stat-new" class="text-2xl font-bold text-red-400">0</div></div>
  </div>
 </section>
</main>
</div>
<audio id="notif" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
<script>
let lastOrderCount=0;
function login(){if(u.value==='admin'&&p.value==='147258'){localStorage.admin=1;login.classList.add('hidden');app.classList.remove('hidden');init()}else alert('Sai')}
function logout(){localStorage.removeItem('admin');location.reload()}
function showTab(t){document.querySelectorAll('section[id^=tab]').forEach(s=>s.classList.add('hidden'));document.getElementById('tab-'+t).classList.remove('hidden');if(t==='orders')loadOrders();if(t==='stats')loadStats()}
async function init(){loadProducts();loadOrders();setInterval(checkNewOrders,10000)}
async function loadProducts(){const r=await fetch('/api/products');const d=await r.json();list.innerHTML=d.map(p=>`<div class="flex justify-between p-2 bg-black rounded"><span>${p.name}</span><button onclick='edit(${JSON.stringify(p)})' class="text-xs">Sửa</button></div>`).join('')}
function edit(p){id.value=p.id;brand.value=p.brand;name.value=p.name;price.value=p.price;torque.value=p.torque||'';image.value=p.image||'';desc_vi.value=p.desc_vi||'';desc_en.value=p.desc_en||''}
f.onsubmit=async e=>{e.preventDefault();const data={brand:brand.value,name:name.value,price:+price.value,torque:torque.value,image:image.value,desc_vi:desc_vi.value,desc_en:desc_en.value};const url=id.value?`/api/products/${id.value}`:'/api/products';await fetch(url,{method:id.value?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});f.reset();loadProducts()}
async function loadOrders(){const r=await fetch('/api/orders');const o=await r.json();orders.innerHTML=o.map(x=>`<div class="p-3 bg-black rounded border ${x.status==='new'?'border-orange-600/50':''}"><div class="flex justify-between"><b>${x.customer_name}</b><span class="text-xs">${new Date(x.created_at).toLocaleString('vi-VN')}</span></div><div class="text-sm text-zinc-400">${x.phone} - ${x.address}</div><div class="text-xs mt1">Tổng: ${(x.total||0).toLocaleString('vi-VN')}₫</div><div class="mt2 text-xs">${x.note||''}</div><button onclick="mark('${x.id}')" class="mt2 text-xs underline">${x.status==='new'?'Đánh dấu đã xử lý':'Đã xử lý'}</button></div>`).join('');lastOrderCount=o.length;updateBadge(o.filter(x=>x.status==='new').length)}
async function checkNewOrders(){const r=await fetch('/api/orders');const o=await r.json();if(o.length>lastOrderCount){notif.play();lastOrderCount=o.length;updateBadge(o.filter(x=>x.status==='new').length);if(!document.getElementById('tab-orders').classList.contains('hidden'))loadOrders()}}
function updateBadge(n){const b=document.getElementById('order-badge');if(n>0){b.textContent=n;b.classList.remove('hidden')}else b.classList.add('hidden')}
async function mark(id){await fetch(`/api/orders/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'done'})});loadOrders()}
async function loadStats(){const r=await fetch('/api/orders');const o=await r.json();const today=new Date().toDateString();const t=o.filter(x=>new Date(x.created_at).toDateString()===today);statToday.textContent=t.reduce((s,x)=>s+(x.total||0),0).toLocaleString('vi-VN')+'₫';statCount.textContent=o.length;statNew.textContent=o.filter(x=>x.status==='new').length}
if(localStorage.admin){login.classList.add('hidden');app.classList.remove('hidden');init()}
</script></body></html>
