<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Sim Racing Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0a0a0a; color: #e4e4e7; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    input, select, textarea { background: #0a0a0a !important; color: #e4e4e7 !important; }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #0a0a0a inset !important; -webkit-text-fill-color: #e4e4e7 !important; }
  </style>
</head>
<body class="antialiased">
  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-orange-600/10 via-transparent to-amber-600/10"></div>
    <div class="absolute top-[-200px] right-[-200px] w-[400px] h-[400px] bg-orange-500/20 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-200px] left-[-200px] w-[400px] h-[400px] bg-amber-500/15 rounded-full blur-[120px]"></div>
    
    <div class="w-full max-w-[380px] relative z-10">
      <div class="bg-[#141414] border border-zinc-800 rounded-[24px] p-8 shadow-2xl">
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-orange-500 to-amber-600 shadow-lg shadow-orange-500/20 mb-4">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <h1 class="text-[22px] font-semibold tracking-tight">SIM RACING ADMIN</h1>
          <p class="text-zinc-500 text-[13px] mt-1">Quản lý sản phẩm</p>
        </div>

        <form onsubmit="event.preventDefault(); login()" class="space-y-4">
          <div>
            <label class="text-[12px] text-zinc-400 mb-1.5 block font-medium">Tên đăng nhập</label>
            <input id="username" value="admin" class="w-full h-11 px-3.5 bg-[#0a0a0a] border border-zinc-800 rounded-xl text-[14px] outline-none focus:border-orange-500/50 focus:ring-2 focus:ring-orange-500/20 transition" autocomplete="username">
          </div>
          <div>
            <label class="text-[12px] text-zinc-400 mb-1.5 block font-medium">Mật khẩu</label>
            <input id="password" type="password" value="147258" class="w-full h-11 px-3.5 bg-[#0a0a0a] border border-zinc-800 rounded-xl text-[14px] outline-none focus:border-orange-500/50 focus:ring-2 focus:ring-orange-500/20 transition" autocomplete="current-password">
          </div>
          <button type="submit" class="w-full h-11 mt-2 bg-gradient-to-r from-orange-500 to-amber-600 hover:from-orange-600 hover:to-amber-700 rounded-xl font-medium text-[14px] text-white shadow-lg shadow-orange-600/20 transition active:scale-[0.98]">
            Đăng nhập
          </button>
        </form>
      </div>
      <p class="text-center text-[12px] text-zinc-600 mt-6">© 2024 Sim Racing Store</p>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="app-screen" class="hidden min-h-screen">
    <header class="sticky top-0 z-30 backdrop-blur-xl bg-[#0a0a0a]/70 border-b border-zinc-900">
      <div class="max-w-[1600px] mx-auto px-4 sm:px-6 h-[64px] flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-orange-500 to-amber-600 flex items-center justify-center">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10z"/>
            </svg>
          </div>
          <div>
            <h1 class="text-[15px] font-semibold leading-none">Quản lý Sim Racing</h1>
            <p class="text-[11px] text-zinc-500 mt-0.5">Admin Dashboard</p>
          </div>
        <div class="flex items-center gap-3">
          <span class="hidden sm:block text-[12px] text-zinc-500">admin</span>
          <button onclick="logout()" class="h-8 px-3 bg-[#141414] hover:bg-zinc-800 border border-zinc-800 rounded-lg text-[12px] font-medium transition">Đăng xuất</button>
        </div>
      </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-4 sm:p-6 grid grid-cols-1 xl:grid-cols-5 gap-5">
      <!-- FORM -->
      <section class="xl:col-span-2">
        <div class="bg-[#141414] border border-zinc-900 rounded-2xl">
          <div class="px-5 py-4 border-b border-zinc-900 flex items-center justify-between">
            <h2 class="text-[14px] font-semibold">Thêm / Sửa sản phẩm</h2>
            <span id="form-mode" class="text-[11px] px-2 py-1 bg-orange-500/10 text-orange-400 rounded-md border border-orange-500/20">Mới</span>
          </div>
          
          <form id="product-form" class="p-5 space-y-4">
            <input type="hidden" id="product-id">
            
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[11px] text-zinc-500 mb-1.5 block">Thương hiệu</label>
                <select id="brand" class="w-full h-10 px-3 bg-[#0a0a0a] border border-zinc-800 rounded-xl text-[13px] outline-none focus:border-orange-500/50">
                  <option>VNM</option>
                  <option>MOZA</option>
                  <option>Simagic</option>
                  <option>Fanatec</option>
                  <option>Conspit</option>
                </select>
              </div>
              <div>
                <label class="text-[11px] text-zinc-500 mb-1.5 block">Danh mục</label>
                <select id="category" class="w-full h-10 px-3 bg-[#0a0a0a] border border-zinc-800 rounded-xl text-[13px] outline-none focus:border-orange-500/50">
                  <option>WheelBase</option>
                  <option>Wheel</option>
                  <option>Pedals</option>
                  <option>Cần Số</option>
                  <option>Phanh Tay</option>
                  <option>Khung</option>
                  <option>Ghế</option>
                  <option>Màn Hình</option>
                  <option>PC</option>
                  <option>Phụ Kiện</option>
                  <option>Motion</option>
                </select>
              </div>
            </div>

            <div>
              <label class="text-[11px] text-zinc-500 mb-1.5 block">Tên sản phẩm *</label>
              <input id="name" required placeholder="VD: MOZA R9 V2" class="w-full h-10 px-3 bg-[#0a0a0a] border border-zinc-800 rounded-xl text-[13px] outline-none focus:border-orange-500/50">
            </div>

            <div class="grid grid-cols-3 gap-3">
              <div class="col-span-2">
                <label class="text-[11px] text-zinc-500 mb-1.5 block">Giá (VND) *</label>
                <input id="price" type="number" required placeholder="8990000" class="w-full h-10 px-3 bg-[#0a0a0a] border border-zinc-800 rounded-xl text-[13px] outline-none focus:border-orange-500/50">
              </div>
              <div>
                <label class="text-[11px] text-zinc-500 mb-1.5 block">Lực (Nm)</label>
                <input id="torque" placeholder="9" class="w-full h-10 px-3 bg-[#0a0a0a] border border-zinc-800 rounded-xl text-[13px] outline-none focus:border-orange-500/50">
              </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[11px] text-zinc-500 mb-1.5 block">Bảo hành</label>
                <input id="warranty" placeholder="12 tháng" class="w-full h-10 px-3 bg-[#0a0a0a] border border-zinc-800 rounded-xl text-[13px] outline-none focus:border-orange-500/50">
              </div>
              <div>
                <label class="text-[11px] text-zinc-500 mb-1.5 block">Tương thích</label>
                <input id="compatibility" placeholder="PC" class="w-full h-10 px-3 bg-[#0a0a0a] border border-zinc-800 rounded-xl text-[13px] outline-none focus:border-orange-500/50">
              </div>
            </div>

            <div>
              <label class="text-[11px] text-zinc-500 mb-1.5 block">URL Hình ảnh</label>
              <input id="image" type="url" placeholder="https://..." class="w-full h-10 px-3 bg-[#0a0a0a] border border-zinc-800 rounded-xl text-[13px] outline-none focus:border-orange-500/50">
            </div>

            <div>
              <label class="text-[11px] text-zinc-500 mb-1.5 block">YouTube URL</label>
              <input id="youtube" type="url" placeholder="https://youtube.com/..." class="w-full h-10 px-3 bg-[#0a0a0a] border border-zinc-800 rounded-xl text-[13px] outline-none focus:border-orange-500/50">
            </div>

            <div>
              <label class="text-[11px] text-zinc-500 mb-1.5 block">Mô tả Tiếng Việt</label>
              <textarea id="desc_vi" rows="2" placeholder="Mô tả chi tiết..." class="w-full px-3 py-2.5 bg-[#0a0a0a] border border-zinc-800 rounded-xl text-[13px] outline-none focus:border-orange-500/50 resize-none"></textarea>
            </div>

            <div>
              <label class="text-[11px] text-zinc-500 mb-1.5 block">Mô tả Tiếng Anh</label>
              <textarea id="desc_en" rows="2" placeholder="English description..." class="w-full px-3 py-2.5 bg-[#0a0a0a] border border-zinc-800 rounded-xl text-[13px] outline-none focus:border-orange-500/50 resize-none"></textarea>
            </div>

            <div class="flex gap-2.5 pt-2">
              <button type="submit" class="flex-1 h-10 bg-gradient-to-r from-orange-500 to-amber-600 hover:from-orange-600 hover:to-amber-700 rounded-xl text-[13px] font-medium text-white shadow shadow-orange-900/20 transition active:scale-[0.98]">
                Lưu sản phẩm
              </button>
              <button type="button" onclick="resetForm()" class="h-10 px-4 bg-[#0a0a0a] hover:bg-zinc-900 border border-zinc-800 rounded-xl text-[13px] font-medium transition">
                Hủy
              </button>
            </div>
          </form>
        </div>
      </section>

      <!-- LIST -->
      <section class="xl:col-span-3">
        <div class="bg-[#141414] border border-zinc-900 rounded-2xl min-h-[600px]">
          <div class="px-5 py-4 border-b border-zinc-900 flex items-center justify-between">
            <div class="flex items-center gap-3">
              <h2 class="text-[14px] font-semibold">Danh sách sản phẩm</h2>
              <span class="text-[11px] px-2 py-0.5 bg-zinc-800 text-zinc-400 rounded-md"><span id="count">0</span> SP</span>
            </div>
            <button onclick="loadProducts()" class="h-8 px-3 bg-[#0a0a0a] hover:bg-zinc-900 border border-zinc-800 rounded-lg text-[12px] flex items-center gap-1.5 transition">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
              Tải lại
            </button>
          </div>
          
          <div id="product-list" class="p-3 space-y-2 max-h-[calc(100vh-180px)] overflow-y-auto">
            <div class="flex items-center justify-center py-20 text-zinc-600">
              <div class="text-center">
                <div class="inline-block w-8 h-8 border-2 border-zinc-700 border-t-orange-500 rounded-full animate-spin mb-3"></div>
                <p class="text-[13px]">Đang tải...</p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

<script>
const tokenKey = 'token';
let products = [];

function showApp(show) {
  document.getElementById('login-screen').classList.toggle('hidden', show);
  document.getElementById('app-screen').classList.toggle('hidden', !show);
}

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = event?.target?.querySelector?.('button') || document.querySelector('#login-screen button');
  
  try {
    btn.disabled = true;
    btn.innerHTML = 'Đang đăng nhập...';
    
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await res.json().catch(() => ({}));
    
    if (!res.ok) {
      throw new Error(data.message || data.error || 'Đăng nhập thất bại');
    }
    
    const token = data.token || data.accessToken;
    if (!token) throw new Error('Không nhận được token');
    
    localStorage.setItem(tokenKey, token);
    showApp(true);
    loadProducts();
  } catch (err) {
    alert('Lỗi đăng nhập: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Đăng nhập';
  }
}

function logout() {
  localStorage.removeItem(tokenKey);
  products = [];
  showApp(false);
}

function formatPrice(v) {
  const n = Number(v) || 0;
  return n.toLocaleString('vi-VN') + '₫';
}

function getToken() {
  return localStorage.getItem(tokenKey);
}

async function loadProducts() {
  const list = document.getElementById('product-list');
  const count = document.getElementById('count');
  
  try {
    const token = getToken();
    if (!token) throw new Error('Chưa đăng nhập');
    
    const res = await fetch('/api/products', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    const data = await res.json().catch(() => ({}));
    
    if (!res.ok) {
      throw new Error(data.message || data.error || `HTTP ${res.status}`);
    }
    
    // Ensure products is always an array
    if (Array.isArray(data)) {
      products = data;
    } else if (data && Array.isArray(data.products)) {
      products = data.products;
    } else if (data && Array.isArray(data.data)) {
      products = data.data;
    } else {
      products = [];
    }
    
  } catch (err) {
    products = [];
    alert('Lỗi tải sản phẩm: ' + err.message);
    if (err.message.includes('401') || err.message.toLowerCase().includes('unauthorized') || err.message.includes('token')) {
      logout();
    }
  }
  
  count.textContent = Array.isArray(products) ? products.length : 0;
  renderProducts();
}

function renderProducts() {
  const list = document.getElementById('product-list');
  
  if (!Array.isArray(products) || products.length === 0) {
    list.innerHTML = `
      <div class="flex flex-col items-center justify-center py-20 text-zinc-600">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="opacity-30 mb-3"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <p class="text-[13px]">Chưa có sản phẩm</p>
      </div>`;
    return;
  }
  
  list.innerHTML = products.map(p => {
    const id = p.id || p._id || '';
    const img = p.image || p.imageUrl || '';
    return `
    <div class="group flex items-center gap-3 p-3 bg-[#0a0a0a] hover:bg-[#111] border border-zinc-900 hover:border-zinc-800 rounded-xl transition">
      <div class="w-[64px] h-[64px] rounded-lg overflow-hidden bg-[#141414] border border-zinc-900 flex-shrink-0">
        <img src="${img}" alt="" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/128x128/141414/52525b?text=IMG'">
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-start gap-2">
          <h3 class="text-[13.5px] font-medium truncate">${p.name || 'Không tên'}</h3>
          ${p.torque ? `<span class="text-[10px] px-1.5 py-0.5 bg-orange-500/10 text-orange-400 rounded border-orange-500/20 flex-shrink-0">${p.torque}Nm</span>` : ''}
        </div>
        <div class="flex items-center gap-2 mt-1">
          <span class="text-[11px] text-zinc-500">${p.brand || ''}</span>
          <span class="text-zinc-700">•</span>
          <span class="text-[11px] text-zinc-500">${p.category || ''}</span>
        </div>
        <div class="text-[13px] font-medium text-orange-400 mt-1.5">${formatPrice(p.price)}</div>
      </div>
      <div class="flex items-center gap-1.5 opacity-60 group-hover:opacity-100 transition">
        <button onclick="editProduct('${id}')" class="w-8 h-8 grid place-items-center bg-[#141414] hover:bg-zinc-800 border border-zinc-800 rounded-lg transition" title="Sửa">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button onclick="deleteProduct('${id}')" class="w-8 h-8 grid place-items-center bg-[#141414] hover:bg-red-950/50 hover:border-red-900 border-zinc-800 rounded-lg text-zinc-500 hover:text-red-400 transition" title="Xóa">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function resetForm() {
  document.getElementById('product-form').reset();
  document.getElementById('product-id').value = '';
  document.getElementById('brand').value = 'VNM';
  document.getElementById('category').value = 'WheelBase';
  document.getElementById('form-mode').textContent = 'Mới';
  document.getElementById('form-mode').className = 'text-[11px] px-2 py-1 bg-orange-500/10 text-orange-400 rounded-md border border-orange-500/20';
}

function editProduct(id) {
  const p = Array.isArray(products) ? products.find(x => (x.id || x._id) == id) : null;
  if (!p) return alert('Không tìm thấy sản phẩm');
  
  document.getElementById('product-id').value = id;
  document.getElementById('brand').value = p.brand || 'VNM';
  document.getElementById('category').value = p.category || 'WheelBase';
  document.getElementById('name').value = p.name || '';
  document.getElementById('price').value = p.price || '';
  document.getElementById('torque').value = p.torque || '';
  document.getElementById('warranty').value = p.warranty || '';
  document.getElementById('compatibility').value = p.compatibility || '';
  document.getElementById('image').value = p.image || p.imageUrl || '';
  document.getElementById('desc_vi').value = p.desc_vi || p.description_vi || '';
  document.getElementById('desc_en').value = p.desc_en || p.description_en || '';
  document.getElementById('youtube').value = p.youtube || p.youtubeUrl || '';
  
  document.getElementById('form-mode').textContent = 'Sửa';
  document.getElementById('form-mode').className = 'text-[11px] px-2 py-1 bg-blue-500/10 text-blue-400 rounded-md border border-blue-500/20';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function saveProduct(e) {
  e.preventDefault();
  const token = getToken();
  if (!token) return alert('Chưa đăng nhập');
  
  const id = document.getElementById('product-id').value;
  const payload = {
    brand: document.getElementById('brand').value,
    category: document.getElementById('category').value,
    name: document.getElementById('name').value.trim(),
    price: Number(document.getElementById('price').value) || 0,
    torque: document.getElementById('torque').value.trim(),
    warranty: document.getElementById('warranty').value.trim(),
    compatibility: document.getElementById('compatibility').value.trim(),
    image: document.getElementById('image').value.trim(),
    desc_vi: document.getElementById('desc_vi').value.trim(),
    desc_en: document.getElementById('desc_en').value.trim(),
    youtube: document.getElementById('youtube').value.trim()
  };
  
  if (!payload.name) return alert('Vui lòng nhập tên sản phẩm');
  if (!payload.price) return alert('Vui lòng nhập giá');
  
  const btn = e.target.querySelector('button[type="submit"]');
  const originalText = btn.innerHTML;
  
  try {
    btn.disabled = true;
    btn.innerHTML = 'Đang lưu...';
    
    const url = id ? `/api/products/${id}` : '/api/products';
    const method = id ? 'PUT' : 'POST';
    
    const res = await fetch(url, {
      method,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify(payload)
    });
    
    const data = await res.json().catch(() => ({}));
    
    if (!res.ok) {
      throw new Error(data.message || data.error || 'Lưu thất bại');
    }
    
    alert(id ? 'Đã cập nhật!' : 'Đã thêm sản phẩm!');
    resetForm();
    loadProducts();
  } catch (err) {
    alert('Lỗi lưu: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalText;
  }
}

async function deleteProduct(id) {
  if (!id) return;
  if (!confirm('Xóa sản phẩm này? Hành động không thể hoàn tác.')) return;
  
  const token = getToken();
  try {
    const res = await fetch(`/api/products/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.message || data.error || 'Xóa thất bại');
    
    alert('Đã xóa');
    loadProducts();
  } catch (err) {
    alert('Lỗi xóa: ' + err.message);
  }
}

document.getElementById('product-form').addEventListener('submit', saveProduct);

window.addEventListener('DOMContentLoaded', () => {
  const token = getToken();
  if (token) {
    showApp(true);
    loadProducts();
  } else {
    showApp(false);
  }
});

// Expose for inline handlers
window.login = login;
window.logout = logout;
window.loadProducts = loadProducts;
window.editProduct = editProduct;
window.deleteProduct = deleteProduct;
window.resetForm = resetForm;
</script>

<script>
async function uploadImage(file){
  // Dùng Cloudinary unsigned - bạn cần thay YOUR_CLOUD_NAME và UPLOAD_PRESET
  const CLOUD_NAME = 'dgtvjbcqa'; // <-- thay bằng cloud của bạn
  const PRESET = 'simracer_unsigned'; // <-- tạo preset unsigned
  const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', PRESET);
  const res = await fetch(url, {method:'POST', body:fd});
  const data = await res.json();
  return data.secure_url;
}
document.addEventListener('DOMContentLoaded', ()=>{
  const imgInput = document.querySelector('input[placeholder*="imgur"]');
  if(imgInput){
    const wrapper = document.createElement('div');
    wrapper.innerHTML = `<input type="file" accept="image/*" class="mt-2 text-sm" id="fileUpload"><div id="uploadStatus" class="text-xs text-gray-400 mt-1"></div>`;
    imgInput.parentNode.appendChild(wrapper);
    document.getElementById('fileUpload').addEventListener('change', async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      document.getElementById('uploadStatus').textContent = 'Đang upload...';
      try{
        const url = await uploadImage(file);
        imgInput.value = url;
        document.getElementById('uploadStatus').textContent = '✓ Upload xong!';
      }catch(err){
        document.getElementById('uploadStatus').textContent = 'Lỗi upload, dùng Cloudinary của bạn';
      }
    });
  }
});
